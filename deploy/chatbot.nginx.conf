server {
    server_name chatbot.janapriyahomes.com;

    client_max_body_size 50M;

    # Backend API routes (all proxied to uvicorn on 127.0.0.1:8800)
    location /api/       { proxy_pass http://127.0.0.1:8800; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_read_timeout 120s; }
    location /auth/      { proxy_pass http://127.0.0.1:8800; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /webhook/   { proxy_pass http://127.0.0.1:8800; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /sites      { proxy_pass http://127.0.0.1:8800; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /bots       { proxy_pass http://127.0.0.1:8800; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /leads      { proxy_pass http://127.0.0.1:8800; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /analytics  { proxy_pass http://127.0.0.1:8800; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /users      { proxy_pass http://127.0.0.1:8800; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /agent      { proxy_pass http://127.0.0.1:8800; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /api-keys   { proxy_pass http://127.0.0.1:8800; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /docs       { proxy_pass http://127.0.0.1:8800; proxy_set_header Host $host; }
    location /openapi.json { proxy_pass http://127.0.0.1:8800; proxy_set_header Host $host; }

    # /admin (SPA) -> backend also serves the built files
    location /admin {
        proxy_pass http://127.0.0.1:8800;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Upload POST goes to backend (exact match)
    location = /uploads {
        proxy_pass http://127.0.0.1:8800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }

    # Serving uploaded files (static) — prefix match, won't interfere with POST /uploads above
    location /uploads/ {
        alias /home/narendhar/projects/chatbot/public/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Public widget assets (static)
    # Backend StaticFiles mount (/static -> public/) served directly
    # Backend StaticFiles mount (/static -> public/). Short cache so widget fixes
    # propagate quickly. Images/videos/PDFs live under /static/uploads/ which
    # has its own longer-cache block above.
    location /static/ {
        alias /home/narendhar/projects/chatbot/public/;
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # Widget test page — bare host page with widget pre-embedded
    location /test/ {
        proxy_pass http://127.0.0.1:8800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Widget API endpoints — proxied to FastAPI backend (not static).
    # The widget.js and widget.css files are served via /static/ above.
    location /widget/ {
        proxy_pass http://127.0.0.1:8800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # Root redirects to admin
    location = / { return 302 /admin/; }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/chatbot.janapriyahomes.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/chatbot.janapriyahomes.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = chatbot.janapriyahomes.com) { return 301 https://$host$request_uri; }
    listen 80;
    server_name chatbot.janapriyahomes.com;
    return 404;
}
